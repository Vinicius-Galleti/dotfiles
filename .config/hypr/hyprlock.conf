source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(1, 13, 30, 1.0)
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = false
}

# ─── Top-left: hora gigante ───
label {
    monitor =
    text = cmd[update:60000] date +"%H:%M"
    color = rgba(122, 167, 217, 1.0)
    font_size = 180
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 70, -80
    halign = left
    valign = top
}

# ─── Top-left: linha decorativa ───
label {
    monitor =
    text = ────────────────────
    color = rgba(122, 167, 217, 1.0)
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 90, -320
    halign = left
    valign = top
}

# ─── Top-right: pet ASCII vivo (clica pra acariciar) ───
label {
    monitor =
    text = cmd[update:1500] $HOME/.config/hypr/scripts/pet-render.sh
    color = rgba(122, 167, 217, 0.95)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = -90, -80
    halign = right
    valign = top
    onclick = $HOME/.config/hypr/scripts/pet-pet.sh
}

# ─── Top-left: data por extenso (caps) ───
label {
    monitor =
    text = cmd[update:3600000] $HOME/.config/hypr/scripts/lock-data.sh
    color = rgba(122, 167, 217, 0.95)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Bold
    position = 90, -340
    halign = left
    valign = top
}

# ─── Bottom-left: barra de progresso do dia ───
label {
    monitor =
    text = cmd[update:60000] $HOME/.config/hypr/scripts/progress-day.sh
    color = rgba(122, 167, 217, 0.85)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 90, 220
    halign = left
    valign = bottom
}

# ─── Bottom-left: barra de progresso do ano ───
label {
    monitor =
    text = cmd[update:3600000] $HOME/.config/hypr/scripts/progress-year.sh
    color = rgba(122, 167, 217, 0.6)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 90, 250
    halign = left
    valign = bottom
}

# ─── Bottom-right: stats sistema ───
label {
    monitor =
    text = cmd[update:300000] $HOME/.config/hypr/scripts/lock-stats.sh host
    color = rgba(122, 167, 217, 0.55)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -90, 280
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:300000] $HOME/.config/hypr/scripts/lock-stats.sh kernel
    color = rgba(122, 167, 217, 0.55)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -90, 252
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] $HOME/.config/hypr/scripts/lock-stats.sh uptime
    color = rgba(122, 167, 217, 0.55)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -90, 224
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:30000] $HOME/.config/hypr/scripts/lock-stats.sh mem
    color = rgba(122, 167, 217, 0.55)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -90, 196
    halign = right
    valign = bottom
}

# ─── Input minimalista (sem caixa, estilo terminal) ───
input-field {
    monitor =
    size = 1600, 40
    position = 140, 90
    halign = left
    valign = bottom

    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = rgba(122, 167, 217, 0.0)
    outline_thickness = 0

    font_family = JetBrainsMono Nerd Font Bold
    font_color = rgba(122, 167, 217, 1.0)

    placeholder_text = ¯\_( ͡❛ ͜ʖ ͡❛)_/¯
    check_color = rgba(46, 89, 149, 0.6)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
    dots_size = 0.3
    dots_spacing = 0.4
}

auth {
    fingerprint:enabled = true
}
