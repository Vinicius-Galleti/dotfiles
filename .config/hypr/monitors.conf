# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
#
# Default: deixa o Hyprland detectar automaticamente todos os outputs.
# Edite para o seu hardware se quiser posicionar/escalonar manualmente.

monitor=,preferred,auto,1

# Exemplos (descomente e ajuste conforme o seu setup):
#
# Dois monitores 1080p lado a lado (principal à esquerda):
# monitor = DP-1,    preferred, 0x0,    1
# monitor = HDMI-A-1, preferred, 1920x0, 1
#
# Retina/HiDPI:
# env = GDK_SCALE,1.75
# monitor = ,preferred,auto,1.75
#
# Monitor secundário rotacionado em retrato (transform: 1 = 90°, 3 = 270°):
# monitor = DP-2, preferred, auto, 1, transform, 1
